name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/smartx-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/smartx-frontend

jobs:
  # ── Build & Push Docker images ─────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Deploy to Kubernetes ───────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Deploy to Kubernetes
        run: |
          # Replace image tags in manifests
          sed -i "s|ghcr.io/OWNER/smartx-backend:latest|${{ env.BACKEND_IMAGE }}:${IMAGE_TAG}|g" infra/k8s/backend.yaml
          sed -i "s|ghcr.io/OWNER/smartx-frontend:latest|${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG}|g" infra/k8s/frontend.yaml

          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/secrets.yaml
          kubectl apply -f infra/k8s/redis.yaml
          kubectl apply -f infra/k8s/backend.yaml
          kubectl apply -f infra/k8s/frontend.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl apply -f infra/k8s/hpa.yaml

          # Wait for rollouts
          kubectl -n smartx rollout status deployment/backend --timeout=120s
          kubectl -n smartx rollout status deployment/frontend --timeout=120s
