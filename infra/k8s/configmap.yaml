apiVersion: v1
kind: ConfigMap
metadata:
  name: smartx-config
  namespace: smartx
data:
  NODE_ENV: "production"
  PORT: "3000"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CLAUDE_MODEL: "claude-sonnet-4-20250514"
  CLAUDE_MAX_TOKENS: "1024"
  CLAUDE_TEMPERATURE: "0.7"
  JWT_EXPIRATION: "15m"
  JWT_REFRESH_EXPIRATION: "7d"
  NEXT_PUBLIC_API_URL: "http://backend:3000/api"
